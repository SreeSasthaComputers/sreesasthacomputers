<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Jobs - Sree Sastha Computers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; margin: 0; padding: 0; }
    .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
    h1 { color: #1e40af; font-size: 36px; text-align: center; margin-bottom: 30px; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #1e40af; color: white; }
    tr:hover { background: #f1f5f9; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; margin: 2px; }
    .edit-btn { background: #2563eb; color: white; }
    .search-box { width: 100%; padding: 15px; border: 1px solid #cbd5e1; border-radius: 10px; margin-bottom: 20px; font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Manage Jobs</h1>
    
    <input type="text" id="searchBox" class="search-box" placeholder="Search by Order ID, Customer Name or Phone..." onkeyup="searchTable()">

    <div class="card">
      <table id="jobsTable">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer Name</th>
            <th>Phone</th>
            <th>Device</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data will be loaded here later -->
        </tbody>
      </table>
    </div>

    <button onclick="logout()" style="background:#ef4444; color:white; padding:12px 24px; border:none; border-radius:8px; margin-top:20px;">Logout</button>
  </div>

  <script>
    // Simple logout
    function logout() {
      localStorage.removeItem('isLoggedIn');
      window.location.href = 'index.html';
    }

    // Search function
    function searchTable() {
      const input = document.getElementById("searchBox").value.toUpperCase();
      const table = document.getElementById("jobsTable");
      const tr = table.getElementsByTagName("tr");

      for (let i = 1; i < tr.length; i++) {
        const td = tr[i].getElementsByTagName("td");
        let found = false;
        for (let j = 0; j < td.length; j++) {
          if (td[j] && td[j].innerHTML.toUpperCase().indexOf(input) > -1) {
            found = true;
            break;
          }
        }
        tr[i].style.display = found ? "" : "none";
      }
    }

    // Placeholder for future data loading from Google Sheet
    console.log("Manage page loaded. Connect to Google Sheet later.");
  </script>
</body>
</html>
