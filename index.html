<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sree Sastha Computers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; margin: 0; padding: 0; }
    .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
    h1 { color: #1e40af; font-size: 42px; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #475569; font-size: 18px; margin-bottom: 50px; }
    .card { 
      background: white; border-radius: 20px; padding: 50px 30px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
      transition: all 0.3s; border: 3px solid #e2e8f0;
    }
    .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    .blue-card { border-color: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SREE SASTHA COMPUTERS</h1>
    <p class="subtitle">Laptop & PC Repair Service • Thiruvananthapuram, Kerala</p>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px;">
      <a href="create.html" class="card blue-card">
        <i class="fa-solid fa-plus" style="font-size: 65px; color: #2563eb; margin-bottom: 25px;"></i>
        <h2 style="font-size: 28px; margin: 10px 0;">Create New Job</h2>
        <p style="color: #64748b;">Register a new service request</p>
      </a>
      
      <a href="manage.html" class="card">
        <i class="fa-solid fa-list-check" style="font-size: 65px; color: #475569; margin-bottom: 25px;"></i>
        <h2 style="font-size: 28px; margin: 10px 0;">Manage Jobs</h2>
        <p style="color: #64748b;">View, edit & export all jobs</p>
      </a>
    </div>
  </div>
</body>
</html>
