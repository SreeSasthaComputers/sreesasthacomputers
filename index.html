<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sree Sastha Computers</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:#f1f5f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
}

.card{
    background:white;
    border-radius:20px;
    padding:40px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    font-size:70px;
    color:#2563eb;
    margin-bottom:20px;
}

h1{
    color:#1e293b;
    margin-bottom:10px;
}

.subtitle{
    color:#64748b;
    margin-bottom:35px;
}

.btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:18px;
    margin-top:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:white;
}

.create-btn{
    background:#16a34a;
}

.create-btn:hover{
    background:#15803d;
}

.manage-btn{
    background:#2563eb;
}

.manage-btn:hover{
    background:#1d4ed8;
}

.footer{
    margin-top:30px;
    color:#94a3b8;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

```
<div class="card">

    <div class="logo">
        <i class="fas fa-laptop-medical"></i>
    </div>

    <h1>Sree Sastha Computers</h1>

    <div class="subtitle">
        Service Job Management System
    </div>

    <button
        class="btn create-btn"
        onclick="window.location.href='create.html'">
        <i class="fas fa-plus-circle"></i>
        Create New Job
    </button>

    <button
        class="btn manage-btn"
        onclick="window.location.href='manage.html'">
        <i class="fas fa-list-check"></i>
        Manage Jobs
    </button>

    <div class="footer">
        Powered by Google Sheets & Google Drive
    </div>

</div>
```

</div>

</body>
</html>
