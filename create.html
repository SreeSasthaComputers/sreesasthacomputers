<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create New Job</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,Arial,sans-serif;
background:#f1f5f9;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
color:#1e293b;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:600;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #cbd5e1;
border-radius:8px;
font-size:16px;
}

textarea{
resize:vertical;
}

.checkbox-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.btn{
width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:10px;
background:#16a34a;
color:white;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#15803d;
}

.preview{
margin-top:10px;
max-width:200px;
display:none;
border-radius:10px;
}

.loader{
display:none;
text-align:center;
margin-top:15px;
font-weight:bold;
color:#2563eb;
}

.back-btn{
margin-bottom:20px;
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<button
class="btn back-btn"
onclick="location.href='index.html'">
Back </button>

<h1>Create New Service Job</h1>

<label>Job Date</label> <input type="date" id="orderDate">

<label>Customer Name *</label> <input type="text" id="customerName">

<label>Phone Number *</label> <input type="text" id="phone">

<label>Device Type</label> <select id="deviceType">

<option>Laptop</option>
<option>Desktop PC</option>
<option>Printer</option>
<option>Monitor</option>
<option>Other</option>
</select>

<label>Accessories</label>

<div class="checkbox-grid">

<label><input type="checkbox" value="Charger"> Charger</label> <label><input type="checkbox" value="Bag"> Bag</label> <label><input type="checkbox" value="Mouse"> Mouse</label> <label><input type="checkbox" value="Keyboard"> Keyboard</label>

</div>

<input
type="text"
id="otherAccessories"
placeholder="Other Accessories">

<label>Complaint</label>

<textarea id="complaint" rows="4"></textarea>

<label>Upload Device Photo</label>

<input
type="file"
id="photo"
accept="image/*">

<img id="preview" class="preview">

<label>Estimate Completion Date</label> <input type="date" id="estimateCompletion">

<label>Estimate Amount ₹</label> <input type="number" id="estimateAmount">

<button
class="btn"
onclick="submitJob()">
Create Job </button>

<div id="loader" class="loader">
Submitting Job...
</div>

</div>
</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwyY9bU8pf8PwjrHXk34a0X4QtNNb5q34bSRz7P6MBX1En2bniMwA5S7nx6WT7UchnzyA/exec";

document
.getElementById("photo")
.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

const img =
document.getElementById("preview");

img.src = event.target.result;
img.style.display = "block";

};

reader.readAsDataURL(file);

});

async function submitJob(){

const customerName =
document.getElementById("customerName").value.trim();

const phone =
document.getElementById("phone").value.trim();

if(!customerName || !phone){

alert("Customer Name and Phone are mandatory");

return;
}

document.getElementById("loader").style.display="block";

let accessories=[];

document
.querySelectorAll(".checkbox-grid input[type='checkbox']")
.forEach(cb=>{

if(cb.checked){
accessories.push(cb.value);
}

});

const otherAcc =
document.getElementById("otherAccessories")
.value.trim();

if(otherAcc){
accessories.push(otherAcc);
}

const photoFile =
document.getElementById("photo").files[0];

let photoBase64 = "";

if(photoFile){

photoBase64 = await new Promise((resolve)=>{

const reader = new FileReader();

reader.onload = function(e){

resolve(e.target.result);

};

reader.readAsDataURL(photoFile);

});

}

const formData = new FormData();

formData.append("action","createJob");

formData.append(
"orderDate",
document.getElementById("orderDate").value
);

formData.append(
"customerName",
customerName
);

formData.append(
"phone",
phone
);

formData.append(
"deviceType",
document.getElementById("deviceType").value
);

formData.append(
"accessories",
accessories.join(", ")
);

formData.append(
"complaint",
document.getElementById("complaint").value
);

formData.append(
"estimateCompletion",
document.getElementById("estimateCompletion").value
);

formData.append(
"estimateAmount",
document.getElementById("estimateAmount").value
);

formData.append(
"photo",
photoBase64
);

try{

const response =
await fetch(SCRIPT_URL,{
method:"POST",
body:formData
});

const result =
await response.json();

document.getElementById("loader").style.display="none";

if(result.success){

alert(
"Job Created Successfully\nOrder ID : "
+ result.orderID
);

const whatsappMessage =
`Hello ${customerName},

Your service request has been registered.

Order ID : ${result.orderID}

Thank you,
Sree Sastha Computers`;

window.open(
"https://wa.me/"
+ phone
+ "?text="
+ encodeURIComponent(whatsappMessage),
"_blank"
);

location.reload();

}else{

alert(result.error || "Submission Failed");

}

}catch(error){

document.getElementById("loader").style.display="none";

alert("Error connecting to server");

console.error(error);

}

}

</script>

</body>
</html>
