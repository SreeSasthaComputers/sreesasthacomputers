<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Job - Sree Sastha Computers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; margin: 0; }
    .container { max-width: 700px; margin: 40px auto; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    label { display: block; margin: 15px 0 5px; font-weight: 600; color: #334155; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 16px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 18px; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 style="text-align:center; color:#1e40af; margin-bottom:30px;">Create New Service Job</h1>
      
      <label>Job Date</label><input id="date" type="date">
      <label>Customer Name *</label><input id="name" type="text">
      <label>Customer Phone (91) *</label><input id="phone" type="text" placeholder="917907502401">
      <label>Device Type</label>
      <select id="device">
        <option>Laptop</option>
        <option>Desktop PC</option>
        <option>Printer</option>
        <option>Other</option>
      </select>

      <label>Accessories</label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <label><input type="checkbox" id="acc1"> Charger</label>
        <label><input type="checkbox" id="acc2"> Bag</label>
        <label><input type="checkbox" id="acc3"> Mouse</label>
        <label><input type="checkbox" id="acc4"> Keyboard</label>
      </div>
      <input id="otherAcc" placeholder="Other accessories" style="margin-top:10px;">

      <label>Complaint</label><textarea id="complaint" rows="4"></textarea>
      
      <!-- Image Upload -->
      <label>Upload Photo (Optional)</label>
      <input id="photo" type="file" accept="image/*">

      <label>Estimate Completion Date</label><input id="delivery" type="date">
      <label>Estimate Amount ₹</label><input id="estimate" type="number">

      <button onclick="submitJob()">Create Job & Send WhatsApp</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyY9bU8pf8PwjrHXk34a0X4QtNNb5q34bSRz7P6MBX1En2bniMwA5S7nx6WT7UchnzyA/exec";

    async function submitJob() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name || !phone) return alert("Customer Name and Phone are required!");

      const formData = new FormData();
      formData.append("orderDate", document.getElementById('date').value);
      formData.append("customerName", name);
      formData.append("phone", phone);
      formData.append("deviceType", document.getElementById('device').value);
      formData.append("complaint", document.getElementById('complaint').value);
      formData.append("estimateCompletion", document.getElementById('delivery').value);
      formData.append("estimateAmount", document.getElementById('estimate').value || 0);

      let acc = [];
      if (document.getElementById('acc1').checked) acc.push("Charger");
      if (document.getElementById('acc2').checked) acc.push("Bag");
      if (document.getElementById('acc3').checked) acc.push("Mouse");
      if (document.getElementById('acc4').checked) acc.push("Keyboard");
      if (document.getElementById('otherAcc').value.trim()) acc.push(document.getElementById('otherAcc').value.trim());
      formData.append("accessories", acc.join(", "));

      const photoFile = document.getElementById('photo').files[0];
      if (photoFile) formData.append("photo", photoFile);

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData
        });

        const orderID = await response.text();
        alert(`✅ Job Created Successfully!\nOrder ID: ${orderID}`);

        const msg = `Hello ${name},\nYour job has been registered.\nOrder ID: ${orderID}`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");

      } catch (err) {
        alert("Job submitted. Check Google Sheet.");
      }
    }
  </script>
</body>
</html>
