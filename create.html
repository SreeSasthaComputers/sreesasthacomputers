<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Job - Sree Sastha Computers</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-2xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8">Create New Service Job</h1>
    
    <div class="bg-white rounded-3xl shadow-xl p-8 space-y-8">
      <!-- Your form fields here (same as before) -->
      <div><label>Job Date</label><input id="date" type="date" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
      <div><label>Customer Name *</label><input id="name" type="text" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
      <div><label>Customer Phone (91) *</label><input id="phone" type="text" placeholder="917907502401" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
      <!-- ... other fields ... -->

      <button onclick="submitJob()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-semibold text-xl">
        Create Job & Send WhatsApp
      </button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyY9bU8pf8PwjrHXk34a0X4QtNNb5q34bSRz7P6MBX1En2bniMwA5S7nx6WT7UchnzyA/exec";

    async function submitJob() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name || !phone) return alert("Name and Phone required!");

      const formData = new FormData();
      formData.append("orderDate", document.getElementById('date').value);
      formData.append("customerName", name);
      formData.append("phone", phone);
      // ... add other fields ...

      const photoFile = document.getElementById('photo').files[0];
      if (photoFile) formData.append("photo", photoFile);

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'   // This helps with CORS
        });

        alert("Job submitted! Check Google Sheet.");
        window.open(`https://wa.me/${phone}?text=Job registered`, "_blank");

      } catch (err) {
        console.error(err);
        alert("Job submitted (check Google Sheet).");
      }
    }
  </script>
</body>
</html>
