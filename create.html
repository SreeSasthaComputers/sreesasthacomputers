<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Job - Sree Sastha Computers</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-2xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8">Create New Service Job</h1>
    
    <div class="bg-white rounded-3xl shadow-xl p-8 space-y-8">
      <div><label>Job Date</label><input id="date" type="date" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
      <div><label>Customer Name <span class="text-red-500">*</span></label><input id="name" type="text" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
      <div><label>Customer Phone (91) <span class="text-red-500">*</span></label><input id="phone" type="text" placeholder="91790XXXXXXX" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
      
      <div><label>Device Type</label>
        <select id="device" class="w-full p-4 border border-slate-300 rounded-2xl">
          <option>Laptop</option>
          <option>Desktop PC</option>
          <option>Printer</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label class="block mb-3">Accessories</label>
        <div class="grid grid-cols-2 gap-4">
          <label><input type="checkbox" id="acc1"> Charger</label>
          <label><input type="checkbox" id="acc2"> Bag</label>
          <label><input type="checkbox" id="acc3"> Mouse</label>
          <label><input type="checkbox" id="acc4"> Keyboard</label>
        </div>
        <input id="otherAcc" placeholder="Other accessories" class="mt-4 w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <div><label>Complaint / Service Required</label><textarea id="complaint" rows="4" class="w-full p-4 border border-slate-300 rounded-2xl"></textarea></div>
      
      <div>
        <label>Upload Photo (Optional)</label>
        <input id="photo" type="file" accept="image/*" class="w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <div><label>Estimate Completion Date</label><input id="delivery" type="date" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
      <div><label>Estimate Amount ₹</label><input id="estimate" type="number" class="w-full p-4 border border-slate-300 rounded-2xl"></div>

      <button onclick="submitJob()" class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-3xl font-semibold text-xl">
        Create Job & Send WhatsApp
      </button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyY9bU8pf8PwjrHXk34a0X4QtNNb5q34bSRz7P6MBX1En2bniMwA5S7nx6WT7UchnzyA/exec";

    async function submitJob() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name || !phone) {
        alert("Customer Name and Phone Number are required!");
        return;
      }

      const formData = new FormData();
      formData.append("orderDate", document.getElementById('date').value);
      formData.append("customerName", name);
      formData.append("phone", phone);
      formData.append("deviceType", document.getElementById('device').value);

      let acc = [];
      if (document.getElementById('acc1').checked) acc.push("Charger");
      if (document.getElementById('acc2').checked) acc.push("Bag");
      if (document.getElementById('acc3').checked) acc.push("Mouse");
      if (document.getElementById('acc4').checked) acc.push("Keyboard");
      if (document.getElementById('otherAcc').value.trim()) acc.push(document.getElementById('otherAcc').value.trim());
      formData.append("accessories", acc.join(", "));

      formData.append("complaint", document.getElementById('complaint').value);
      formData.append("estimateCompletion", document.getElementById('delivery').value);
      formData.append("estimateAmount", document.getElementById('estimate').value || 0);

      const photoFile = document.getElementById('photo').files[0];
      if (photoFile) formData.append("photo", photoFile);

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData
        });

        const orderID = await response.text();
        
        alert(`✅ Job Created Successfully!\nOrder ID: ${orderID}`);

        const msg = `Hello ${name},\nYour job has been registered.\nOrder ID: ${orderID}\nStatus: Order Taken`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");

      } catch (err) {
        console.error(err);
        alert("Job submitted. Check Google Sheet.");
      }
    }
  </script>
</body>
</html>
